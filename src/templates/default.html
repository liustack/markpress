<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    /**
     * Default Theme — Clean minimalist design
     */

    :root {
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --bg-primary: #ffffff;
      --border-color: #d2d2d7;
      --border-light: #e5e5ea;
      --accent: #0071e3;
      --code-bg: #f5f5f7;
      --code-block-bg: #f6f8fa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 56px 120px;
    }

    /* Heading System */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      line-height: 1.25;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      margin-top: 0;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      margin-top: 40px;
    }

    h3 {
      font-size: 18px;
    }

    h4 {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* Paragraph */
    p {
      margin-bottom: 1.25em;
    }

    strong {
      font-weight: 600;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Blockquote */
    blockquote {
      margin: 1.5em 0;
      padding: 0 0 0 1em;
      border-left: 3px solid var(--border-color);
      color: var(--text-secondary);
      font-style: italic;
    }

    blockquote p:last-child {
      margin-bottom: 0;
    }

    /* Code */
    code {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.875em;
      padding: 0.15em 0.4em;
      background: var(--code-bg);
      border-radius: 4px;
      color: var(--text-primary);
    }

    pre {
      margin: 1.5em 0;
      padding: 20px 24px;
      background: var(--code-block-bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      overflow-x: auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
    }

    pre code {
      display: block;
      padding: 0;
      background: transparent;
      color: inherit;
      border-radius: 0;
      font-size: inherit;
      font-family: inherit;
    }

    /* Syntax highlighting — light theme */
    pre .hljs { color: #24292e; }
    pre .hljs-comment, pre .hljs-quote { color: #6a737d; font-style: italic; }
    pre .hljs-keyword, pre .hljs-selector-tag, pre .hljs-literal, pre .hljs-type { color: #d73a49; font-weight: 600; }
    pre .hljs-string, pre .hljs-attr, pre .hljs-symbol, pre .hljs-bullet, pre .hljs-addition { color: #032f62; }
    pre .hljs-number { color: #005cc5; }
    pre .hljs-title, pre .hljs-section { color: #6f42c1; }
    pre .hljs-built_in, pre .hljs-name { color: #005cc5; }
    pre .hljs-variable, pre .hljs-template-variable { color: #e36209; }
    pre .hljs-meta { color: #6f42c1; }

    /* codehilite compatibility */
    pre .c, pre .ch, pre .cm, pre .c1, pre .cs { color: #6a737d; font-style: italic; }
    pre .k, pre .kc, pre .kd, pre .kn, pre .kp, pre .kr, pre .kt { color: #d73a49; font-weight: 600; }
    pre .s, pre .s1, pre .s2, pre .sa, pre .sb, pre .sc, pre .sd, pre .se, pre .sh, pre .si, pre .sr, pre .ss, pre .sx { color: #032f62; }
    pre .nf, pre .fm { color: #6f42c1; }
    pre .mi, pre .mf, pre .mh, pre .mo, pre .mb, pre .il { color: #005cc5; }
    pre .bp { color: #005cc5; }

    /* Table */
    table {
      width: 100%;
      margin: 1.5em 0;
      border-collapse: collapse;
      font-size: 15px;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    th {
      font-weight: 600;
      color: var(--text-primary);
      border-bottom-color: var(--border-color);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Lists */
    ul, ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    li {
      margin: 0.4em 0;
      line-height: 1.75;
    }

    li::marker {
      color: var(--text-secondary);
    }

    /* Images */
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5em auto;
      border-radius: 8px;
    }

    /* Divider */
    hr {
      border: none;
      height: 1px;
      background: var(--border-color);
      margin: 2em 0;
    }

    /* Print */
    @page {
      size: A4;
      margin: 24mm 20mm;
    }

    @media print {
      .container {
        padding: 0;
        max-width: none;
      }

      h1 { font-size: 24px; }
      h2 { font-size: 18px; }

      pre {
        background: var(--code-block-bg) !important;
        color: var(--text-primary) !important;
        border: 1px solid var(--border-light);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      pre code { color: inherit !important; }
    }
  </style>
  {{styles}}
</head>

<body>
  <article class="container">
    {{body}}
  </article>
</body>

</html>
